<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Select Multiple Values Display</title>
</head>
<body>

<form id="itemForm">
  <label for="mi">Choose values:</label>
  <select id="mi" multiple>
    <option value="PEN">PEN</option>
    <option value="PENCIL">PENCIL</option>
    <option value="BOOK">BOOK</option>
    <option value="ERASER">ERASER</option>
  </select>
</form>

<p id="ps">Selected values will be displayed here.</p>

<script>
  const selectBox = document.querySelector("#mi");
  const display = document.querySelector("#ps");

  const updateSelection = () => {
    const selectedValues = [...selectBox.selectedOptions].map(o => o.value);

    display.textContent = selectedValues.length
      ? `Selected values: ${selectedValues.join(", ")}`
      : "No values selected.";
  };

  // Modern event handling
  selectBox.addEventListener("change", updateSelection);

  // Optional: initialize on page load
  updateSelection();
</script>

</body>
</html>
