<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Demo</title>
</head>
<body>

<label for="myTextarea">Address:</label><br>
<textarea id="myTextarea"></textarea><br><br>
<button id="myButton" type="button">Try it</button>

<script>
  const button = document.querySelector("#myButton");
  const textarea = document.querySelector("#myTextarea");

  const fillAddress = () => {
    textarea.value = "Fifth Avenue, New York City";
  };

  // Modern event handling
  button.addEventListener("click", fillAddress);
</script>

</body>
</html>
