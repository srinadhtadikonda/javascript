<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Registration Form</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:700px;
    background:#fff;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
}

h1{
    text-align:center;
    color:#0077cc;
    margin-bottom:20px;
}

.form-group{
    margin-bottom:15px;
}

label{
    font-weight:bold;
    display:block;
    margin-bottom:6px;
}

input[type=text],
select,
textarea{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:16px;
}

textarea{
    resize:none;
    height:80px;
}

fieldset{
    border:1px solid #ccc;
    border-radius:6px;
    padding:10px;
}

legend{
    color:#0077cc;
    font-weight:bold;
}

.options label{
    display:inline;
    margin-right:15px;
    font-weight:normal;
}

.buttons{
    text-align:center;
    margin-top:20px;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
    margin:5px;
}

.submit{
    background:#28a745;
    color:white;
}

.reset{
    background:#dc3545;
    color:white;
}

button:hover{
    opacity:.9;
}

#result{
    margin-top:25px;
    background:#f4f4f4;
    padding:15px;
    border-left:5px solid green;
    display:none;
    border-radius:5px;
}

@media(max-width:768px){
.container{
    width:100%;
}
}
</style>

</head>
<body>

<div class="container">

<h1>Student Registration Form</h1>

<form id="studentForm">

<div class="form-group">
<label>First Name</label>
<input type="text" id="fname" required>
</div>

<div class="form-group">
<label>Last Name</label>
<input type="text" id="lname" required>
</div>

<div class="form-group">
<fieldset>
<legend>Course</legend>

<div class="options">
<label><input type="checkbox" value="DCA"> DCA</label>

<label><input type="checkbox" value="Web Developer"> Web Developer</label>

<label><input type="checkbox" value="Web Designer"> Web Designer</label>
</div>

</fieldset>
</div>

<div class="form-group">
<fieldset>
<legend>Fee Payment</legend>

<div class="options">

<label><input type="radio" name="fee" value="Cash" checked> Cash</label>

<label><input type="radio" name="fee" value="Cheque"> Cheque</label>

<label><input type="radio" name="fee" value="DD"> DD</label>

</div>

</fieldset>
</div>

<div class="form-group">
<label>Place</label>

<select id="place">

<option>Ongole</option>
<option>Nellore</option>
<option>Guntur</option>
<option>Tirupathi</option>
<option>Gudur</option>
<option>Vijayawada</option>

</select>
</div>

<div class="form-group">
<label>Qualification</label>

<select id="qualification" multiple>

<option>SSC</option>
<option>Inter</option>
<option>Degree</option>
<option>PG</option>
<option>Diploma</option>

</select>

</div>

<div class="form-group">

<label>Address</label>

<textarea id="address"></textarea>

</div>

<div class="buttons">

<button class="submit">Submit</button>

<button type="reset" class="reset">Reset</button>

</div>

</form>

<div id="result"></div>

</div>

<script>

const form=document.getElementById("studentForm");
const result=document.getElementById("result");

form.addEventListener("submit",function(e){

e.preventDefault();

let fname=document.getElementById("fname").value;
let lname=document.getElementById("lname").value;

let courses=[];

document.querySelectorAll("input[type=checkbox]:checked")
.forEach(item=>courses.push(item.value));

if(courses.length==0){
alert("Please select at least one course.");
return;
}

let fee=document.querySelector("input[name=fee]:checked").value;

let place=document.getElementById("place").value;

let qualification=[...document.getElementById("qualification").selectedOptions]
.map(option=>option.value);

let address=document.getElementById("address").value;

result.style.display="block";

result.innerHTML=`

<h2 style="color:green;">Registration Successful</h2>

<hr><br>

<p><strong>Name :</strong> ${fname} ${lname}</p>

<p><strong>Course :</strong> ${courses.join(", ")}</p>

<p><strong>Fee :</strong> ${fee}</p>

<p><strong>Place :</strong> ${place}</p>

<p><strong>Qualification :</strong> ${qualification.join(", ")}</p>

<p><strong>Address :</strong> ${address}</p>

`;

});

form.addEventListener("reset",function(){

setTimeout(()=>{
result.style.display="none";
},100);

});

</script>

</body>
</html>
